11. System anty-fake

Duży problem platform.

Rozwiązania:

selfie verification

AI wykrywanie fake zdjęć

reputacja kont

12. Model biznesowy

Największe przychody:

1️⃣ tokeny
2️⃣ private show
3️⃣ premium profile
4️⃣ promowanie ogłoszeń
5️⃣ reklamy

