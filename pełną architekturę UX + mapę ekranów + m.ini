7. Ekonomia aplikacji

Najważniejszy element aplikacji.

System tokenów jak w ShowUp.tv.

Tokeny służą do:

tipów
private show
unlock content
promocji ogłoszeń
8. Mechaniki uzależniające (dopamine design)

Największe platformy stosują psychologię nagrody.

1️⃣ Niespodziewane nagrody

np.

ktoś polubił Twój profil
ktoś ogląda Twój stream
otrzymałeś napiwek

Powiadomienia.

2️⃣ Ranking popularności

Ludzie walczą o ranking.

Top:

streamerów
profili
twórców
3️⃣ System streak

np.

logowanie codziennie
codzienny stream

nagrody.

4️⃣ Mikrocele

Streamer ustawia:

50 tokenów → zdjęcie
100 tokenów → akcja
200 tokenów → private show

To bardzo zwiększa napiwki.

