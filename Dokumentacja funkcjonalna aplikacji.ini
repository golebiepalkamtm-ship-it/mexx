Dokumentacja funkcjonalna aplikacji
(połączenie funkcji 4 platform)
1. Wizja produktu

Aplikacja jest platformą społecznościową dla dorosłych, która łączy:

społeczność

randki

streaming live

marketplace ogłoszeń

komunikację prywatną

ekonomię twórców

Model platformy można opisać jako:

Social Network + Dating + Live Streaming + Marketplace

Platforma działa w modelu:

UGC (User Generated Content) + Freemium + Mikropłatności

2. Główne moduły systemu

Architektura aplikacji składa się z 8 głównych modułów:

1️⃣ User Management
2️⃣ Profiles & Identity
3️⃣ Social Network
4️⃣ Dating & Discovery
5️⃣ Live Streaming
6️⃣ Messaging System
7️⃣ Marketplace (Ogłoszenia)
8️⃣ Payment & Virtual Economy

3. Role użytkowników
3.1 Gość (Guest)

Może:

przeglądać profile

przeglądać ogłoszenia

oglądać wybrane streamy

przeglądać publiczne zdjęcia

Nie może:

pisać wiadomości

oglądać treści prywatnych

korzystać z płatnych funkcji

Cel:

zachęcenie do rejestracji.

3.2 Użytkownik (Member)

Standardowy użytkownik platformy.

Może:

tworzyć profil

dodawać zdjęcia

wysyłać wiadomości

korzystać z czatu

oglądać transmisje

uczestniczyć w społeczności

wyszukiwać użytkowników

publikować ogłoszenia

3.3 Twórca / Streamer

Dodatkowa rola użytkownika.

Może:

prowadzić transmisje live

otrzymywać napiwki

organizować prywatne pokazy

sprzedawać dostęp do treści

monetyzować profil

3.4 Ogłoszeniodawca (Service Provider)

Osoba publikująca ogłoszenia usług.

Może:

dodawać ogłoszenia

publikować cennik

zarządzać galerią

promować ofertę

otrzymywać kontakt od klientów

3.5 Moderator / Administrator

Odpowiada za:

moderację treści

banowanie kont

weryfikację użytkowników

obsługę zgłoszeń

4. System kont i rejestracji
Rejestracja

Wymagane dane:

email

hasło

płeć

